name: "[llm-gateway] Build & Deploy"

on:
    pull_request:
        types:
        - closed
        branches:
        - develop
        paths:
        - "backends/llm-gateway/**"
    workflow_dispatch:
        inputs:
            env:
                description: "Deploy level (default: dev)"
                required: true
                default: "dev"
                type: choice
                options:
                - dev
                - stg
                - prod
            namespace:
                description: "Namespace to deploy"
                required: true
                default: "dev"
                type: string
            additional-tag:
                description: "Use when there is a name to add to the image tag"

env:
    APP_NAME: llm-gateway
    CONTAINER_NAME: llm-gateway
    TAG: 0.0.1
    REGISTRY: temp-registry
    DEPLOY_LEVEL: dev
    BRANCH_NAME: ${{ github.base_ref }}
    NAMESPACE: dev

jobs:
    build-for-public-acr:
        if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Add postfix tag
          if: inputs.additional-tag
          run: |
            echo "TAG=${{ env.TAG }}-${{ inputs.additional-tag }}" >> $GITHUB_ENV

        - name: Check env variables
          run: |
            echo ${{ env.TAG }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to ACR
          uses: docker/login-action@v3
          with:
            registry: ${{ vars.ACR_HOST }}
            username: ${{ secrets.ACR_USERNAME }}
            password: ${{ secrets.ACR_PASSWORD }}

        - name: Image Build & Push to ACR
          uses: docker/build-push-action@v5
          with:
            push: true
            platforms: linux/amd64,linux/arm64
            context: "{{defaultContext}}:/backends/${{ env.APP_NAME }}"
            tags: ${{ vars.ACR_HOST }}/playground/${{ env.APP_NAME }}:${{ env.TAG }}
            file: Dockerfile

    deploy-to-kubernetes:
      needs: build-for-public-acr
      runs-on: ubuntu-latest
      steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Kubernetes Namespace
        if: inputs.namespace != ''
        run: |
          echo "NAMESPACE=${{ inputs.namespace }}" >> $GITHUB_ENV

      - name: AKS Deployment Image Change
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n ${{ env.NAMESPACE }} set image deploy ${{ env.APP_NAME }} ${{ env.CONTAINER_NAME }}=${{ vars.ACR_HOST }}/playground/${{ env.APP_NAME }}:${{ env.TAG }}

      - name: AKS Get Deployments
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n ${{ env.NAMESPACE }} get deploy -o wide

      - name: AKS Rollout Deployments
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n ${{ env.NAMESPACE }} rollout restart deployment/${{ env.APP_NAME }}

      - name: AKS Get pods
        uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        with:
          args: -n ${{ env.NAMESPACE }} get pods
  