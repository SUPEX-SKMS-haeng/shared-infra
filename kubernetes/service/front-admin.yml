---
apiVersion: v1
kind: Service
metadata:
  name: front-admin-svc
  namespace: dev
spec:
  type: ClusterIP
  ports:
    - port: 80
  selector:
    app: front-admin
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  name: front-admin-svc-lb
  namespace: dev
spec:
  type: LoadBalancer
  ports:
    - port: 80
  selector:
    app: front-admin
