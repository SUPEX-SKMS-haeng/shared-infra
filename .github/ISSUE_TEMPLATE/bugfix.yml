name: "버그 수정"
description: "버그 리포트 및 수정 태스크"
labels: ["fix"]
body:
  - type: markdown
    attributes:
      value: "## 버그 수정 태스크"
  - type: textarea
    id: current-behavior
    attributes:
      label: "현재 동작"
      description: "현재 어떤 문제가 발생하는지"
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: "기대 동작"
      description: "정상적으로 동작해야 하는 방식"
    validations:
      required: true
  - type: textarea
    id: reproduce-steps
    attributes:
      label: "재현 방법"
      description: "버그를 재현하는 단계"
    validations:
      required: true
  - type: textarea
    id: related-files
    attributes:
      label: "관련 파일"
      description: "문제가 있는 것으로 의심되는 파일 경로"
