apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: chat
  name: chat
  namespace: dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: chat
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: chat
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: WORKER
          value: "1"
        envFrom:
        - configMapRef:
            name: common-config
        - configMapRef:
            name: infra-config
        - secretRef:
            name: common-secret
        image: workforce2.azurecr.io/playground/chat:0.0.1
        imagePullPolicy: Always
        name: chat
        ports:
        - containerPort: 8003
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 8003
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 300m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /mnt/data
          name: data
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: dev-account
      serviceAccountName: dev-account
      terminationGracePeriodSeconds: 30
      volumes:
      - name: data
        emptyDir: {}