# ============================================================
# Prefect 스케줄러 (Server + Worker + PostgreSQL)
# ============================================================
# 사용법:
#   docker compose up -d
#   docker compose down
#   docker compose logs -f worker
#
# flows/ 디렉토리에 파이프라인 코드를 작성하고
# deploy.py로 deployment를 등록하면 Worker가 스케줄대로 실행합니다.
#
# Deployment 등록: Worker 시작 시 자동 실행 (deploy.py → worker start)
#
# Worker 수평 확장:
#   docker compose up -d --scale worker=4
#
# UI: http://localhost:4200
# API: http://localhost:4200/api
# ============================================================

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: prefect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - prefect-network

  # ── Prefect Server (API + UI) ──
  server:
    image: prefecthq/prefect:3-latest
    container_name: prefect-server
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_SERVER_API_PORT: "4200"
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:prefect@postgres:5432/prefect"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - prefect-network

  # ── Prefect Worker ──
  worker:
    image: prefecthq/prefect:3-latest
    restart: unless-stopped
    command: bash -c "prefect work-pool create default-pool --type process 2>/dev/null; python /opt/prefect/flows/deploy.py && prefect worker start --pool default-pool --type process"
    environment:
      PREFECT_API_URL: "http://server:4200/api"
    volumes:
      - ./flows:/opt/prefect/flows
    depends_on:
      server:
        condition: service_healthy
    networks:
      - prefect-network

volumes:
  postgres_data:

networks:
  prefect-network:
    driver: bridge
