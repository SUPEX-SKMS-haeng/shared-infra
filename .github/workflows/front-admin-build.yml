name: "[front-admin] Build & Deploy"

on:
    pull_request:
        types:
        - closed
        branches:
        - develop
        paths:
        - "frontends/admin/**"
        - "frontends/shared/**"
    workflow_dispatch:
        inputs:
            env:
                description: "Deploy level (default: dev)"
                required: true
                default: "dev"
                type: choice
                options:
                - dev
                - stg
                - prod
            additional-tag:
                description: "Use when there is a name to add to the image tag"

env:
    APP_NAME: front-admin
    TAG: 0.0.1
    REGISTRY: temp-registry
    DEPLOY_LEVEL: dev
    BRANCH_NAME: ${{ github.base_ref }}

jobs:
    build-for-public-acr:
        if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Add postfix tag
          if: inputs.additional-tag
          run: |
            echo "TAG=${{ env.TAG }}-${{ inputs.additional-tag }}" >> $GITHUB_ENV

        - name: Check env variables
          run: |
            echo ${{ env.TAG }}
#             echo ${{ env.NAMESPACE }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to ACR
          uses: docker/login-action@v3
          with:
            registry: ${{ vars.ACR_HOST }}
            username: ${{ secrets.ACR_USERNAME }}
            password: ${{ secrets.ACR_PASSWORD }}

        - name: Image Build & Push to ACR
          uses: docker/build-push-action@v5
          with:
            push: true
            platforms: linux/amd64,linux/arm64
            context: "{{defaultContext}}:/frontends"
            tags: ${{ vars.ACR_HOST }}/playground/${{ env.APP_NAME }}:${{ env.TAG }}
            file: admin/Dockerfile

