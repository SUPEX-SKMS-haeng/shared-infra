apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: prefect-server
    project: agent
  name: prefect-server
  namespace: agent
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: prefect-server
      project: agent
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: prefect-server
        project: agent
    spec:
      automountServiceAccountToken: true
      containers:
      - name: prefect-server
        image: prefecthq/prefect:3-latest
        imagePullPolicy: IfNotPresent
        command: ["prefect", "server", "start", "--host", "0.0.0.0"]
        env:
        - name: PREFECT_SERVER_API_HOST
          value: "0.0.0.0"
        - name: PREFECT_SERVER_API_PORT
          value: "4200"
        - name: PREFECT_API_DATABASE_CONNECTION_URL
          valueFrom:
            secretKeyRef:
              name: prefect-secret
              key: database-url
        ports:
        - containerPort: 4200
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4200
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4200
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: agent-account
      serviceAccountName: agent-account
      terminationGracePeriodSeconds: 30
