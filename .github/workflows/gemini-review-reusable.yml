# ============================================================
# Gemini Code Review - Reusable Workflow
# ============================================================
# shared-infra에 1개만 정의하고, 각 앱 레포에서 호출합니다.
#
# 사용법 (각 앱 레포의 .github/workflows/gemini-review.yml):
#   jobs:
#     review:
#       uses: agent-template-apps/shared-infra/.github/workflows/gemini-review-reusable.yml@main
#       secrets: inherit
# ============================================================

name: Gemini Code Review (Reusable)

on:
  workflow_call:
    inputs:
      app_type:
        description: "앱 타입: backend 또는 frontend"
        required: true
        type: string
      app_name:
        description: "앱 이름 (예: backend-auth, frontend)"
        required: true
        type: string
    secrets:
      GEMINI_API_KEY:
        required: true

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gemini Code Review (Backend)
        if: inputs.app_type == 'backend'
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |-
            {
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                           "ghcr.io/github/github-mcp-server:v0.27.0"],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              }
            }
          prompt: |
            이 PR의 변경사항을 아래 기준으로 리뷰해줘.
            리뷰 결과는 한국어로 작성하고, 각 카테고리별로 이모지와 함께 정리해줘.
            인라인 코멘트는 해당 코드 라인에 직접 달아줘.

            ## 리뷰 기준

            ### 🎯 로직 검증
            - PR 설명/Issue의 요구사항을 코드가 충족하는지
            - 누락된 edge case가 없는지
            - API 엔드포인트가 명세대로 동작하는지
            - 에러 시나리오에서 적절한 ServiceException이 발생하는지
            - 새 기능에 대한 테스트가 있고, 실제 로직을 검증하는지
            > 판정: ✅ 모두 충족 / ⚠️ edge case 일부 누락 / ❌ 핵심 요구사항 미충족 / ➖ 기능 변경 없음

            ### 📐 컨벤션 준수
            - **레이어 분리**: routes→service→repository 책임 분리 (routes에 비즈니스 로직 금지, service에서 DB 직접 접근 금지)
            - **에러 패턴**: ServiceException + ErrorCode 사용, bare except 금지, 라우터에서 직접 JSONResponse 반환 금지
            - **에러 코드**: 새 ErrorCode 추가 시 번호 체계(1XXXX/9XXXX) 준수
            - **API 응답 형식**: {"success": true/false, "data"/"error": ...} 준수
            - **설정 관리**: 새 환경변수 → config.py에 등록, .env.example 반영
            - **의존성**: 새 패키지 → pyproject.toml 등록, 기존 라이브러리로 해결 가능한지 확인
            > 판정: ✅ 팀 규칙 준수 / ⚠️ 경미한 위반 / ❌ 핵심 패턴 미준수 / ➖ 해당 변경 없음

            ### 👁️ 가독성
            - Python 네이밍 컨벤션 (snake_case 변수/함수, PascalCase 클래스, UPPER_CASE 상수)
            - 타입 힌트가 적절히 사용되었는지
            - 매직 넘버/스트링 대신 상수 사용
            - print() 대신 logger 사용
            - 순환 import가 없는지
            > 판정: ✅ 명확하고 읽기 쉬움 / ⚠️ 일부 개선 필요 / ❌ 심각한 가독성 문제 / ➖ 해당 변경 없음

            ### ⚡ 최적화
            - 불필요한 코드 중복이 없는지
            - N+1 쿼리 등 DB 성능 이슈가 없는지
            - 불필요한 연산이나 반복이 없는지
            > 판정: ✅ 이상 없음 / ⚠️ 개선 가능 / ❌ 명확한 성능 문제 / ➖ 해당 변경 없음

            ### 🔒 보안
            - 하드코딩된 시크릿, API 키, 비밀번호가 없는지
            - SQL injection 가능성 (raw SQL 사용 시 파라미터 바인딩 확인)
            - 인증/인가: get_current_user() 의존성을 사용하는지
            - 민감 정보가 로그에 노출되지 않는지
            - CORS, 헤더 조작 이슈가 없는지
            > 판정: ✅ 이상 없음 / ⚠️ 직접적 위험은 아니나 개선 필요 / ❌ 보안 취약점 발견 / ➖ 해당 변경 없음

            ## 출력 형식

            ### 인라인 코멘트
            - 코드 수정이 필요한 경우, 반드시 GitHub Suggested Changes 형식을 사용:
              ```suggestion
              수정된 코드
              ```
            - 각 제안에 [CRITICAL/HIGH/MEDIUM/LOW] 태그와 수정 이유를 간결하게 설명
            - 칭찬이나 긍정 피드백은 작성하지 마. 문제점과 개선사항만 코멘트해

            ### 최종 요약 (PR 코멘트)
            아래 스코어카드 테이블 형식으로 작성해:

            | 카테고리 | 상태 | 비고 |
            |---------|------|------|
            | 🎯 로직 검증 | ✅/⚠️/❌/➖ | 한줄 요약 |
            | 📐 컨벤션 준수 | ✅/⚠️/❌/➖ | 한줄 요약 |
            | 👁️ 가독성 | ✅/⚠️/❌/➖ | 한줄 요약 |
            | ⚡ 최적화 | ✅/⚠️/❌/➖ | 한줄 요약 |
            | 🔒 보안 | ✅/⚠️/❌/➖ | 한줄 요약 |

            상태 판정:
            - ✅ 이상 없음: 해당 카테고리의 모든 체크 항목 충족
            - ⚠️ 점검 필요: 경미한 위반이나 개선 가능한 부분 존재
            - ❌ 수정 필수: 심각한 위반, 보안 취약점, 핵심 패턴 미준수
            - ➖ 해당 없음: 이 PR에서 해당 카테고리의 코드 변경 없음

            테이블 아래에 ⚠️ 또는 ❌ 항목만 골라서 구체적인 지적사항을 불릿으로 정리해.
            ✅ 와 ➖ 항목은 추가 설명 불필요.

      - name: Gemini Code Review (Frontend)
        if: inputs.app_type == 'frontend'
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          settings: |-
            {
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": ["run", "-i", "--rm", "-e", "GITHUB_PERSONAL_ACCESS_TOKEN",
                           "ghcr.io/github/github-mcp-server:v0.27.0"],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              }
            }
          prompt: |
            이 PR의 변경사항을 아래 기준으로 리뷰해줘.
            리뷰 결과는 한국어로 작성하고, 각 카테고리별로 이모지와 함께 정리해줘.
            인라인 코멘트는 해당 코드 라인에 직접 달아줘.

            ## 리뷰 기준

            ### 🎯 로직 검증
            - PR 설명/Issue의 요구사항을 코드가 충족하는지
            - 사용자 인터랙션 시나리오가 빠짐없이 처리되는지
            - 로딩/에러/빈 상태가 모두 처리되는지
            - API 호출 실패 시 사용자에게 에러 표시가 되는지
            > 판정: ✅ 모두 충족 / ⚠️ 일부 시나리오 누락 / ❌ 핵심 요구사항 미충족 / ➖ 기능 변경 없음

            ### 📐 컨벤션 준수
            - **컴포넌트 구조**: 함수형 컴포넌트 + hooks, 파일당 export default 1개
            - **레이어 분리**: UI 렌더링은 components/, 비즈니스 로직은 hooks/, API는 api/, 상태는 store/
            - **import 규칙**: @shared/ 또는 @/ 절대경로 사용, 상대경로 금지
            - **타입 정의**: PascalCase 타입명, camelCase 필드, any 타입 금지
            - **API 함수**: @shared/lib/axios.axiosInstance 사용, 변환 로직 금지 (인터셉터 처리)
            - **상태 관리**: atomWithQuery/atomWithMutation은 hooks/에 정의, store/는 순수 클라이언트 상태만, useQuery/useMutation 직접 import 금지
            - **i18n**: 하드코딩 문자열 금지 → t() 사용
            - **의존성**: 새 패키지 → package.json 등록, @shared/ 유틸로 대체 가능한지 확인
            > 판정: ✅ 팀 규칙 준수 / ⚠️ 경미한 위반 / ❌ 핵심 패턴 미준수 / ➖ 해당 변경 없음

            ### 👁️ 가독성
            - 네이밍 컨벤션 (PascalCase 컴포넌트, camelCase 변수/함수)
            - Props 인터페이스가 정의되어 있는지
            - 컴포넌트가 너무 크지 않은지 (200줄 이상이면 분리 고려)
            - snake_case를 프론트에서 직접 쓰지 않는지 (caseConverter 사용)
            - useAtomValue 사용 시 도메인 특화 이름으로 구조분해 (data→users, isLoading→isUsersLoading)
            > 판정: ✅ 명확하고 읽기 쉬움 / ⚠️ 일부 개선 필요 / ❌ 심각한 가독성 문제 / ➖ 해당 변경 없음

            ### ⚡ 최적화
            - 불필요한 리렌더링 유발 코드가 없는지
            - useEffect cleanup이 빠지지 않았는지
            - 불필요한 코드 중복이 없는지
            - useAtom 이중 구조분해 사용 금지 (useAtomValue/useSetAtom 사용)
            > 판정: ✅ 이상 없음 / ⚠️ 개선 가능 / ❌ 명확한 성능 문제 / ➖ 해당 변경 없음

            ### 🔒 보안
            - 하드코딩된 토큰, API URL이 없는지
            - 인증이 필요한 API에 토큰이 올바르게 전달되는지
            - XSS 취약점 (dangerouslySetInnerHTML 사용 시 sanitize 확인)
            - 민감 정보가 console.log에 노출되지 않는지
            > 판정: ✅ 이상 없음 / ⚠️ 직접적 위험은 아니나 개선 필요 / ❌ 보안 취약점 발견 / ➖ 해당 변경 없음

