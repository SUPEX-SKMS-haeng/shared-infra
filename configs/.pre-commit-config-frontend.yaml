# 프론트엔드 pre-commit 설정
# setup-repo.sh에 의해 .pre-commit-config.yaml로 복사됩니다.
#
# 최초 설치: pip install pre-commit && pre-commit install
# 수동 실행: pre-commit run --all-files

repos:
  # ── Prettier: 코드 포맷 ──
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, css, json, yaml, markdown]

  # ── 기본 점검 ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
