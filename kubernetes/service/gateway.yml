apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: dev
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: http
    port: 8000
    protocol: TCP
    targetPort: 8000
  - name: dashboard
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: gateway
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  annotations:
  name: gateway-svc-lb
  namespace: dev
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 8000
    protocol: TCP
    targetPort: 8000
  - name: dashboard
    port: 8080
    protocol: TCP
    targetPort: 8080
  selector:
    app: gateway