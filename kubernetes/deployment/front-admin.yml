apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: front-admin
  name: front-admin
  namespace: dev
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: front-admin
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: front-admin
    spec:
      automountServiceAccountToken: true
      containers:
      - image: workforce2.azurecr.io/playground/front-admin:0.0.1
        imagePullPolicy: Always
        name: front-admin
        ports:
          - containerPort: 80
            name: http
            protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
          tcpSocket:
            port: 80
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 300m
            memory: 512Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
          - mountPath: /etc/nginx/sites-available/node-server
            name: node-server
            subPath: node-server
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: dev-account
      serviceAccountName: dev-account
      terminationGracePeriodSeconds: 30
      volumes:
        - configMap:
            defaultMode: 420
            name: front-node-server
          name: node-server
