apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-account
  namespace: dev
secrets:
- name: dev-account-token
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: dev-account-token
  namespace: dev
  annotations:
    kubernetes.io/service-account.name: "dev-account"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dev-account
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: dev-account
  namespace: dev